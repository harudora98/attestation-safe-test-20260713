name: Harmless attestation ingress validation

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - name: Create harmless subject
        shell: bash
        run: printf 'harmless-attestation-subject\n' > artifact.bin

      - name: Create harmless custom attestation
        uses: actions/attest@v4
        with:
          subject-path: artifact.bin
          predicate-type: 'https://example.test/$(printf)'
          predicate: '{}'
